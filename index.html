<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻雀手動点数計算</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>麻雀手動点数計算</h1>
            <p>メンツを手動で作成して正確な点数計算をします</p>
        </header>

        <main>
            <section class="manual-selection-section">
                <div class="meld-builder">
                    <h2>メンツ作成</h2>
                    <div class="meld-controls">
                        <div class="meld-type-selector">
                            <label>メンツの種類:</label>
                            <select id="meldType">
                                <option value="shuntsu">順子 (3枚連続)</option>
                                <option value="koutsu">刻子 (同じ牌3枚)</option>
                                <option value="kantsu">槓子 (同じ牌4枚)</option>
                            </select>
                            <select id="kantsuType" style="display: none;">
                                <option value="ankan">暗槓</option>
                                <option value="minkan">明槓</option>
                            </select>
                        </div>
                        
                        <div class="current-meld">
                            <h3>現在のメンツ: <span id="currentMeldDisplay">なし</span></h3>
                            <div id="currentMeldTiles" class="meld-tiles"></div>
                            <div class="meld-actions">
                                <button id="completeMeld" disabled>メンツ完成</button>
                                <button id="clearMeld">クリア</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tile-selector">
                    <h2>牌を選択</h2>
                    <div class="tile-groups">
                        <div class="tile-group">
                            <h3>萬子</h3>
                            <div class="tiles-row">
                                <div class="tile clickable" data-tile="1m">一萬</div>
                                <div class="tile clickable" data-tile="2m">二萬</div>
                                <div class="tile clickable" data-tile="3m">三萬</div>
                                <div class="tile clickable" data-tile="4m">四萬</div>
                                <div class="tile clickable" data-tile="5m">五萬</div>
                                <div class="tile clickable" data-tile="6m">六萬</div>
                                <div class="tile clickable" data-tile="7m">七萬</div>
                                <div class="tile clickable" data-tile="8m">八萬</div>
                                <div class="tile clickable" data-tile="9m">九萬</div>
                            </div>
                        </div>
                        
                        <div class="tile-group">
                            <h3>筒子</h3>
                            <div class="tiles-row">
                                <div class="tile clickable" data-tile="1p">一筒</div>
                                <div class="tile clickable" data-tile="2p">二筒</div>
                                <div class="tile clickable" data-tile="3p">三筒</div>
                                <div class="tile clickable" data-tile="4p">四筒</div>
                                <div class="tile clickable" data-tile="5p">五筒</div>
                                <div class="tile clickable" data-tile="6p">六筒</div>
                                <div class="tile clickable" data-tile="7p">七筒</div>
                                <div class="tile clickable" data-tile="8p">八筒</div>
                                <div class="tile clickable" data-tile="9p">九筒</div>
                            </div>
                        </div>
                        
                        <div class="tile-group">
                            <h3>索子</h3>
                            <div class="tiles-row">
                                <div class="tile clickable" data-tile="1s">一索</div>
                                <div class="tile clickable" data-tile="2s">二索</div>
                                <div class="tile clickable" data-tile="3s">三索</div>
                                <div class="tile clickable" data-tile="4s">四索</div>
                                <div class="tile clickable" data-tile="5s">五索</div>
                                <div class="tile clickable" data-tile="6s">六索</div>
                                <div class="tile clickable" data-tile="7s">七索</div>
                                <div class="tile clickable" data-tile="8s">八索</div>
                                <div class="tile clickable" data-tile="9s">九索</div>
                            </div>
                        </div>
                        
                        <div class="tile-group">
                            <h3>字牌</h3>
                            <div class="tiles-row">
                                <div class="tile clickable" data-tile="1z">東</div>
                                <div class="tile clickable" data-tile="2z">南</div>
                                <div class="tile clickable" data-tile="3z">西</div>
                                <div class="tile clickable" data-tile="4z">北</div>
                                <div class="tile clickable" data-tile="5z">白</div>
                                <div class="tile clickable" data-tile="6z">發</div>
                                <div class="tile clickable" data-tile="7z">中</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="hand-builder-section">
                <h2>完成した手牌</h2>
                <div id="completedMelds" class="completed-melds">
                    <p>まだメンツがありません (4つのメンツが必要)</p>
                </div>
                
                <div id="pairSection" class="pair-section" style="display: none;">
                    <h3>雀頭 (ペア) を選択</h3>
                    <div id="pairTiles" class="pair-tiles"></div>
                    <button id="completePair" disabled>雀頭完成</button>
                </div>
                
                <div id="gameConditions" class="game-conditions" style="display: none;">
                    <h3>ゲーム条件</h3>
                    <div class="conditions-grid">
                        <label><input type="checkbox" id="riichi"> リーチ</label>
                        <label><input type="checkbox" id="doubleRiichi"> ダブルリーチ</label>
                        <label><input type="checkbox" id="ippatsu"> 一発</label>
                        <label><input type="checkbox" id="tsumo"> ツモ</label>
                        <label><input type="checkbox" id="haitei"> 海底</label>
                        <label><input type="checkbox" id="houtei"> 河底</label>
                        <label><input type="checkbox" id="rinshan"> 嶺上</label>
                        <label><input type="checkbox" id="chankan"> 槍槓</label>
                    </div>
                    
                    <div class="wind-selector">
                        <label>場風: 
                            <select id="roundWind">
                                <option value="1z">東</option>
                                <option value="2z">南</option>
                                <option value="3z">西</option>
                                <option value="4z">北</option>
                            </select>
                        </label>
                        <label>自風: 
                            <select id="seatWind">
                                <option value="1z">東</option>
                                <option value="2z">南</option>
                                <option value="3z">西</option>
                                <option value="4z">北</option>
                            </select>
                        </label>
                    </div>
                    
                    <div class="final-actions">
                        <button id="calculateScore">点数計算</button>
                        <button id="resetHand">手牌リセット</button>
                    </div>
                </div>
            </section>

            <section class="scoring-section">
                <h2>点数計算</h2>
                <div id="handAnalysis" class="hand-analysis">
                    <p>14枚の牌を認識してください</p>
                </div>
                <div id="scoreResult" class="score-result">
                    <div class="score-details">
                        <div class="han-fu">
                            <span id="hanCount">-</span>翻 <span id="fuCount">-</span>符
                        </div>
                        <div class="points">
                            <div class="dealer-points">
                                親: <span id="dealerPoints">-</span>点
                            </div>
                            <div class="non-dealer-points">
                                子: <span id="nonDealerPoints">-</span>点
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="test-section">
                <h2>テスト用サンプル</h2>
                <div class="sample-hands">
                    <button class="sample-hand" data-tiles="1m,1m,1m,2m,3m,4m,5m,6m,7m,8m,9m,9m,9m,9m">国士無双</button>
                    <button class="sample-hand" data-tiles="1m,2m,3m,4m,5m,6m,7m,8m,9m,1p,1p,1p,2p,2p">一気通貫</button>
                    <button class="sample-hand" data-tiles="1m,1m,1m,2m,2m,2m,3m,3m,3m,4m,4m,4m,5m,5m">四暗刻</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <script src="mahjong-recognition.js"></script>
    <script src="mahjong-scoring.js"></script>
    <script src="app.js"></script>
</body>
</html>
